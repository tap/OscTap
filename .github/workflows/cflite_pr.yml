name: ClusterFuzzLite PR fuzzing

# Coverage-guided libFuzzer fuzzing of the code changed in each PR, under
# ASan and UBSan. Complements the quick standalone fuzz-smoke job in ci.yml.
# Builds an OSS-Fuzz image (Docker), so this job is heavier/slower than the rest.
on:
  pull_request:
    branches: [master]

permissions: read-all

jobs:
  PR:
    runs-on: ubuntu-latest
    concurrency:
      group: cflite-pr-${{ matrix.sanitizer }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    steps:
      - name: Build fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: c++
          sanitizer: ${{ matrix.sanitizer }}
      - name: Run fuzzers (${{ matrix.sanitizer }})
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 120
          mode: code-change
          sanitizer: ${{ matrix.sanitizer }}
